services:
  # Backend: Native Go Service
  - type: web
    name: startup-idea-backend
    runtime: go
    buildCommand: cd backend && go build -o main .
    startCommand: ./backend/main
    plan: free
    envVars:
      - key: PORT
        value: 8085
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false

  # Frontend: Static Site
  - type: web
    name: startup-idea-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://startup-idea-backend.onrender.com
      - key: VITE_WS_BASE_URL
        value: https://startup-idea-backend.onrender.com
